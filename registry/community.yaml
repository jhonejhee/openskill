# Community Skills Registry
# Submit a PR to add your skill here.
# Skills are sorted by category, then alphabetically.

skills:

  # --- Documents ---
  - name: docx
    description: Create, read, and edit Word documents with formatting, tables, and styles
    repo: github.com/anthropics/claude-skills
    path: public/docx/
    tags: [documents, word, office]

  - name: pdf
    description: Extract, merge, split, annotate, and create PDF files
    repo: github.com/anthropics/claude-skills
    path: public/pdf/
    tags: [documents, pdf, files]

  # --- Design ---
  - name: brand-spark
    description: Generate detailed brand concepts with identity, visuals, packaging, and personality
    repo: github.com/[your-org]/openskill
    path: examples/brand-spark/
    tags: [design, branding, identity]

  - name: brand-generator
    description: Quick brand concept generator for design practice
    repo: github.com/[your-org]/openskill
    path: examples/brand-generator/
    tags: [design, branding, practice]

  # --- Development ---
  - name: frontend-design
    description: Build distinctive, production-grade frontend UI with high design quality
    repo: github.com/anthropics/claude-skills
    path: public/frontend-design/
    tags: [frontend, ui, design, react, css]

  - name: fullstack-react-ai
    description: Full-stack AI assistant for React-based projects including Next.js, Vite, and React Native
    repo: github.com/[your-org]/openskill
    path: examples/fullstack-react-ai/
    tags: [frontend, backend, react, nextjs, fullstack]

  # --- Data ---
  - name: xlsx
    description: Create, read, edit, and format Excel spreadsheets
    repo: github.com/anthropics/claude-skills
    path: public/xlsx/
    tags: [data, spreadsheets, excel, office]

  # --- Presentations ---
  - name: pptx
    description: Create and edit PowerPoint presentations with slides, layouts, and speaker notes
    repo: github.com/anthropics/claude-skills
    path: public/pptx/
    tags: [presentations, powerpoint, slides, office]

  # --- Meta ---
  - name: skill-creator
    description: Create, modify, and evaluate Claude skills with test cases and benchmarks
    repo: github.com/anthropics/claude-skills
    path: examples/skill-creator/
    tags: [meta, skills, development]

  - name: openskill
    description: Project-aware skill discovery and package manager for Claude
    repo: github.com/[your-org]/openskill
    path: openskill/
    tags: [meta, skills, package-manager]
